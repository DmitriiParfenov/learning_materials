version: "3.9"

x-network: &network  # &network - это якорь, чтобы потом можно было вставить переменные в сервис
  name: ${DOCKER_NETWORK}_${CI_ENVIRONMENT_NAME}

x-postgres-variables: &postgres-variables
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-minio-variables: &minio-variables
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

x-airflow-common: &airflow-common  # весь блок конфигурации airflow
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env  # якорь только для переменных окружения
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
    _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    AIRFLOW_CONN_MINIO: aws://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@?endpoint_url=http://minio:9000
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags:z  # используй переменную AIRFLOW_PROJ_DIR, либо текущую директорию
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs:z
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config:z
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins:z
  user: ${AIRFLOW_UID:-50000}:0 # используй UID из переменной или 50000 по умолчанию
  depends_on: &airflow-common-depends-on  # якорь только для зависимостей сервисов
    postgres:
      condition: service_healthy
  networks:
    - network

services:
  postgres:
    image: postgres:17.2-bookworm
    shm_size: "1gb"
    environment:
      <<: *postgres-variables
    restart: always
    volumes:
      - postgres_data_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - ${PS_PORT}:5432
    networks:
      - network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - ${MA_PORT}:9000  # S3 API
      - ${MW_PORT}:9001  # Web Console
    volumes:
      - minio_data_volume:/data
    environment:
      <<: *minio-variables
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - network

  airflow-apiserver:
    <<: *airflow-common
    command: api-server  # докер запустит вебсервер (будет команда airflow api-server)
    ports:
      - ${AF_PORT}:8080
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully


  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    volumes:
      - ./scripts:/scripts
    entrypoint: [ "/bin/bash", "/scripts/init.sh" ]
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    user: "0:0"

networks:
  network: *network

volumes:
  postgres_data_volume:
  minio_data_volume:
